apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bm-ai-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: example.com
      http:
        paths:
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: bm-ai-service
                port:
                  number: 80